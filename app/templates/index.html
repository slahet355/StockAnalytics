<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StockAnalytics — Live</title>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  </head>
  <body class="bg-gray-100">
    <div class="container mx-auto p-4" x-data="priceApp()">
      <h1 class="text-2xl font-bold mb-4">StockAnalytics — Live Feed</h1>
      <div class="bg-white shadow rounded p-4">
        <div class="flex items-center justify-between">
          <div>
            <div class="text-gray-500">Symbol</div>
            <div class="text-xl font-mono" x-text="symbol"></div>
          </div>
          <div>
            <div class="text-gray-500">Price</div>
            <div class="text-2xl font-bold" x-text="price"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/js/app.js"></script>
  </body>
  <script>
  function priceApp(){
    return {
      symbol: '—',
      price: '—'
    }
  }
  </script>
</html>
